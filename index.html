<!DOCTYPE html>

<head>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e3a8a);
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 24px;
      padding: 32px 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.30);
      text-align: center;
    }

    .avatar {
      width: 92px;
      height: 92px;
      border-radius: 50%;
      margin: 0 auto 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.18);
      font-size: 34px;
      font-weight: bold;
      border: 2px solid rgba(255,255,255,0.25);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.1;
    }

    .role {
      margin: 0 0 6px;
      font-size: 18px;
      opacity: 0.95;
    }

    .company {
      margin: 0 0 24px;
      font-size: 15px;
      opacity: 0.82;
    }

    .info {
      text-align: left;
      margin: 0 auto 24px;
      max-width: 320px;
    }

    .info p {
      margin: 10px 0;
      font-size: 15px;
      line-height: 1.5;
      word-break: break-word;
    }

    .buttons {
      display: grid;
      gap: 12px;
      margin-top: 8px;
    }

    .btn {
      display: inline-block;
      width: 100%;
      text-decoration: none;
      text-align: center;
      padding: 14px 18px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .btn-primary {
      background: #ffffff;
      color: #0f172a;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.14);
      color: #ffffff;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      opacity: 0.7;
    }

    @media (max-width: 480px) {
      .card {
        padding: 28px 18px;
      }

      h1 {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>

  </main>
</body>
